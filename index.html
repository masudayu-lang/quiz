<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCハードウェア学習クイズ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b65;
    --text3: #9a9a94;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --green-light: #EAF3DE;
    --green-dark: #27500A;
    --green-border: #639922;
    --red-light: #FCEBEB;
    --red-dark: #791F1F;
    --red-border: #E24B4A;
    --radius: 8px;
    --radius-lg: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .container { width: 100%; max-width: 640px; }

  /* ===== PASSWORD SCREEN ===== */
  #pw-screen {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .pw-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem 1.75rem;
    width: 100%;
    max-width: 360px;
  }
  .pw-icon {
    width: 48px; height: 48px;
    background: var(--purple-light);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin: 0 auto 1.25rem;
  }
  .pw-title {
    font-size: 18px; font-weight: 500;
    text-align: center; margin-bottom: 4px;
  }
  .pw-sub {
    font-size: 13px; color: var(--text2);
    text-align: center; margin-bottom: 1.5rem;
  }
  .pw-input-wrap { position: relative; margin-bottom: 10px; }
  .pw-input {
    width: 100%; padding: 11px 40px 11px 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    font-size: 15px; background: var(--card); color: var(--text);
    outline: none; transition: border-color 0.15s;
    letter-spacing: 2px;
  }
  .pw-input:focus { border-color: var(--purple); }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px; padding: 0;
  }
  .pw-btn {
    width: 100%; padding: 11px;
    background: var(--purple); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s;
  }
  .pw-btn:hover { opacity: 0.88; }
  .pw-error {
    font-size: 12px; color: var(--red-dark);
    text-align: center; margin-top: 10px; min-height: 18px;
  }
  .pw-hint { font-size: 12px; color: var(--text3); text-align: center; margin-top: 1rem; }

  /* ===== APP ===== */
  #app { display: none; }
  .screen { display: none; }
  .screen.active { display: block; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 1.25rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .header-title { font-size: 16px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .logout-btn {
    font-size: 12px; color: var(--text3);
    background: none; border: 0.5px solid var(--border);
    border-radius: 20px; padding: 4px 12px; cursor: pointer;
  }
  .logout-btn:hover { color: var(--text2); }

  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: #f1efe8; border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-num { font-size: 22px; font-weight: 500; }

  .section-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .topic-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .topic-pill {
    font-size: 12px; padding: 5px 12px;
    border-radius: 20px; border: 0.5px solid var(--border2);
    background: #f1efe8; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .topic-pill.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }

  .gen-area { margin-bottom: 1rem; }
  .gen-status { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .gen-btn {
    font-size: 12px; padding: 6px 14px;
    border-radius: 20px; border: 0.5px solid var(--border2);
    background: var(--card); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .gen-btn:hover { background: #f1efe8; }
  .gen-btn:disabled { opacity: 0.5; cursor: default; }
  .gen-bar-wrap { width: 100%; height: 3px; background: #e8e6df; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .gen-bar-fill { height: 100%; width: 0%; background: var(--purple); border-radius: 2px; transition: width 0.4s; }

  .start-btn {
    width: 100%; padding: 13px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    background: var(--purple); color: #fff;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s; margin-top: 0.25rem;
  }
  .start-btn:hover { opacity: 0.88; }

  /* quiz */
  .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .prog-wrap { background: #e8e6df; border-radius: 4px; height: 4px; margin-bottom: 1.25rem; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--purple); border-radius: 4px; transition: width 0.3s; }

  .q-card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
  }
  .q-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; background: #f1efe8; color: var(--text2);
    padding: 3px 10px; border-radius: 12px; margin-bottom: 12px;
  }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.6; margin-bottom: 1rem; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    text-align: left; padding: 11px 14px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--card); color: var(--text);
    font-size: 14px; cursor: pointer; transition: all 0.15s; line-height: 1.5;
    font-family: inherit;
  }
  .opt:hover:not(:disabled) { background: #f1efe8; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }
  .opt.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-dark); }
  .tf-row { display: flex; gap: 10px; }
  .tf-btn {
    flex: 1; padding: 14px; font-size: 18px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--card); color: var(--text);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .tf-btn:hover:not(:disabled) { background: #f1efe8; }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.correct { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }
  .tf-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-dark); }
  .feedback {
    margin-top: 12px; padding: 12px 14px;
    border-radius: var(--radius); font-size: 13px; line-height: 1.7;
  }
  .feedback.ok { background: var(--green-light); color: var(--green-dark); }
  .feedback.ng { background: var(--red-light); color: var(--red-dark); }
  .fb-label { font-weight: 500; margin-bottom: 4px; }
  .next-btn {
    margin-top: 1rem; width: 100%; padding: 12px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: #f1efe8; color: var(--text);
    font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .next-btn:hover { background: var(--card); }

  /* result */
  .result-center { text-align: center; padding: 2rem 0 1.5rem; }
  .result-score { font-size: 64px; font-weight: 500; line-height: 1; }
  .result-denom { font-size: 20px; color: var(--text2); margin-top: 4px; }
  .result-msg { font-size: 14px; color: var(--text2); margin-top: 12px; }
  .result-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 1.25rem; }
  .result-log { margin-top: 1.5rem; border-top: 0.5px solid var(--border); padding-top: 1rem; }
  .log-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
  .log-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .log-icon { min-width: 18px; margin-top: 1px; }
  .log-q { color: var(--text); line-height: 1.5; }
  .log-ans { color: var(--text2); font-size: 12px; margin-top: 3px; }
</style>
</head>
<body>
<div class="container">

  <!-- PASSWORD SCREEN -->
  <div id="pw-screen">
    <div class="pw-card">
      <div class="pw-icon">&#128274;</div>
      <div class="pw-title">PCハードウェア学習クイズ</div>
      <div class="pw-sub">アクセスにはパスワードが必要です</div>
      <div class="pw-input-wrap">
        <input type="password" class="pw-input" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
        <button class="pw-toggle" onclick="togglePw()" id="pw-toggle-btn">&#128065;</button>
      </div>
      <button class="pw-btn" onclick="checkPw()">ログイン</button>
      <div class="pw-error" id="pw-error"></div>
      <div class="pw-hint">※ パスワードは管理者にお問い合わせください</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <header>
      <div>
        <div class="header-title">PCハードウェア学習クイズ</div>
        <div class="header-sub" id="header-sub">問題を読み込み中...</div>
      </div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </header>

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">収録問題数</div><div class="stat-num" id="s-total">0</div></div>
        <div class="stat-card"><div class="stat-label">累計正解</div><div class="stat-num" id="s-correct">0</div></div>
        <div class="stat-card"><div class="stat-label">正答率</div><div class="stat-num" id="s-rate">-</div></div>
      </div>
      <div class="section-label">テーマ絞り込み（複数選択可）</div>
      <div class="topic-bar" id="topic-bar"></div>
      <div class="gen-area" id="gen-area"></div>
      <button class="start-btn" id="start-btn" onclick="startQuiz()">20問スタート</button>
    </div>

    <!-- QUIZ -->
    <div id="screen-quiz" class="screen">
      <div class="prog-label">
        <span id="q-counter">問題 1 / 20</span>
        <span id="q-topic-label"></span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div id="quiz-area"></div>
    </div>

    <!-- RESULT -->
    <div id="screen-result" class="screen">
      <div class="result-center">
        <div class="result-score" id="r-score">0</div>
        <div class="result-denom">/ 20問</div>
        <div class="result-msg" id="r-msg"></div>
      </div>
      <div class="result-actions">
        <button class="start-btn" onclick="startQuiz()">もう一度 20問チャレンジ</button>
        <button class="next-btn" onclick="showScreen('screen-home')">トップへ戻る</button>
      </div>
      <div class="result-log" id="result-log"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// パスワード設定 — ここを変更してください
// ============================================================
const PASSWORD = "hardware2024";
// ============================================================

const TOPICS = ["マザーボード基礎","CPUソケット・VRM","メモリ(RAM)","ストレージ","拡張スロット","チップセット","電源・フォームファクター","BIOS・UEFI","ネットワーク・I/O","PC組み立て"];

const SEED_QUESTIONS = [
  // ===== マザーボード基礎 =====
  {t:"マザーボード基礎",type:"4択",q:"マザーボードの主な役割は？",opts:["音声処理","各パーツの接続・通信","映像出力","データ保存"],ans:1,exp:"マザーボードはCPU・メモリ・ストレージなど全パーツをつなぐ基盤です。"},
  {t:"マザーボード基礎",type:"○×",q:"ATXはマザーボードのフォームファクター規格の一種である。",ans:true,exp:"ATXは305×244mmの標準的なフォームファクターで最も普及しています。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボード上でCPUを取り付ける部分の名称は？",opts:["PCIeスロット","CPUソケット","DIMMスロット","M.2スロット"],ans:1,exp:"CPUソケットはCPUを固定・接続する部分。IntelとAMDで形状が異なります。"},
  {t:"マザーボード基礎",type:"○×",q:"Mini-ITXはATXよりも大きいフォームファクターである。",ans:false,exp:"Mini-ITXは170×170mmで、ATX(305×244mm)より大幅に小さい規格です。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボードに電源を供給するメインコネクタは何ピンか？",opts:["20ピン","24ピン","8ピン","4ピン"],ans:1,exp:"現代のATX電源はマザーボードに24ピンのコネクタで接続します。"},
  {t:"マザーボード基礎",type:"○×",q:"CMOSバッテリーはBIOS設定と時計を維持する役割がある。",ans:true,exp:"CMOSバッテリー(CR2032等)はPC電源オフ時もBIOS設定・日時を保持します。"},
  {t:"マザーボード基礎",type:"4択",q:"Micro-ATXのサイズはどれか？",opts:["305×244mm","244×244mm","170×170mm","380×305mm"],ans:1,exp:"Micro-ATXは244×244mmで、ATXより小さくMini-ITXより大きい中間サイズです。"},
  {t:"マザーボード基礎",type:"○×",q:"E-ATXはATXより大きいフォームファクターである。",ans:true,exp:"E-ATX(Extended ATX)は305×330mm程度でATXより横幅が広い上位規格です。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボードのPCBに使われる主な素材は？",opts:["アルミニウム","ガラス繊維エポキシ樹脂(FR4)","シリコン","銅"],ans:1,exp:"PCB(プリント基板)はFR4と呼ばれるガラス繊維強化エポキシ樹脂が一般的です。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードはCPUなしでも正常に動作できる。",ans:false,exp:"CPUはマザーボードの中核部品であり、CPUなしでは動作しません。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボードのバックパネルI/Oに通常含まれないものは？",opts:["USBポート","LANポート","電源ボタン","音声ジャック"],ans:2,exp:"電源ボタンはケースフロントパネルにあり、バックパネルI/Oには含まれません。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードのレイヤー数が多いほど一般的に品質・ノイズ対策が向上する。",ans:true,exp:"ハイエンドマザーボードは6〜12層以上のPCBを持ち、信号の安定性やノイズ対策に優れます。"},
  {t:"マザーボード基礎",type:"4択",q:"ATXマザーボードのネジ穴は通常いくつあるか？",opts:["4個","6個","9個","12個"],ans:2,exp:"ATXマザーボードは標準で9個のネジ穴があり、ケースのスタンドオフに固定します。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードのヒートシンクはCPU専用の冷却部品である。",ans:false,exp:"マザーボードにはVRMやチップセット用のヒートシンクも搭載されています。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボード上のフロントパネルヘッダーに接続するものは？",opts:["GPU","電源ボタン・リセットボタン・LED","CPUクーラー","電源ユニット"],ans:1,exp:"フロントパネルヘッダーにはケースの電源ボタン・リセットボタン・電源LED・HDD LEDを接続します。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードの型番はCPUソケットの種類を示すことが多い。",ans:true,exp:"例えばIntel Z790はLGA1700ソケット対応、AMD X670はAM5ソケット対応を示します。"},
  {t:"マザーボード基礎",type:"4択",q:"POST失敗時に最初に確認すべきは？",opts:["OSの再インストール","メモリの挿し直し","グラフィックカードの交換","電源ユニットの交換"],ans:1,exp:"POST失敗の最も多い原因はメモリの接触不良です。まず挿し直しを試みましょう。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードのQ-LEDはトラブルシューティングに役立つ。",ans:true,exp:"Q-LED/EZ-DEBUGはCPU・DRAM・VGA・BootのLEDでどのコンポーネントで問題が起きているか確認できます。"},
  {t:"マザーボード基礎",type:"4択",q:"マザーボードのRGBヘッダーには主に何が接続されるか？",opts:["冷却ファン","LED照明・ライティング製品","ストレージ","スピーカー"],ans:1,exp:"RGBヘッダー(3ピン5V ARGB/4ピン12V RGB)にはLEDストリップやARGBファンを接続します。"},
  {t:"マザーボード基礎",type:"○×",q:"マザーボードの内部スピーカーヘッダーはサウンドカードの代わりになる。",ans:false,exp:"マザーボードの内部スピーカーヘッダーはBEEP音でエラーを知らせる診断用です。音声再生には使えません。"},
  // ===== CPUソケット・VRM =====
  {t:"CPUソケット・VRM",type:"4択",q:"VRMの役割は？",opts:["映像信号変換","CPUへの安定した電力供給","メモリのエラー訂正","冷却ファン制御"],ans:1,exp:"VRM(Voltage Regulator Module)は電源の電圧をCPUが必要とする低電圧に変換・安定化します。"},
  {t:"CPUソケット・VRM",type:"○×",q:"Intel LGA1700ソケットはAMD AM5ソケットと互換性がある。",ans:false,exp:"IntelとAMDはソケット規格が異なり互換性はありません。"},
  {t:"CPUソケット・VRM",type:"4択",q:"LGAとPGAソケットの違いは？",opts:["LGAはピンがCPU側","LGAはピンがマザーボード側、PGAはCPU側","両方同じ","LGAは古い規格"],ans:1,exp:"LGA(Land Grid Array)はピンがマザーボード側、PGA(Pin Grid Array)はCPU側にピンがあります。"},
  {t:"CPUソケット・VRM",type:"○×",q:"VRMのフェーズ数が多いほど電力供給が安定する傾向がある。",ans:true,exp:"フェーズ数が多いと電流を分散でき、ノイズが減り安定した電力供給が可能です。"},
  {t:"CPUソケット・VRM",type:"4択",q:"AMD AM5ソケットが採用しているピン配列方式は？",opts:["PGA","LGA","BGA","ZIF"],ans:1,exp:"AM5からAMDもLGA方式を採用。ピンがマザーボード側になりました(AM4まではPGA)。"},
  {t:"CPUソケット・VRM",type:"○×",q:"Intel第12世代以降のCPUはLGA1200ソケットで使用できる。",ans:false,exp:"第12世代(Alder Lake)以降はLGA1700ソケットが必要です。LGA1200は第10/11世代用です。"},
  {t:"CPUソケット・VRM",type:"4択",q:"VRMのMOSFETの役割は？",opts:["電圧を変換するスイッチング素子","メモリを制御する素子","映像を処理する素子","音声を増幅する素子"],ans:0,exp:"MOSFETはVRMの核心部品で、高速スイッチングにより電圧変換を行います。"},
  {t:"CPUソケット・VRM",type:"○×",q:"CPUソケットのピンは非常に繊細で曲げると破損することがある。",ans:true,exp:"LGAソケットのピンは細く繊細です。CPUの取り付け時は慎重に行う必要があります。"},
  {t:"CPUソケット・VRM",type:"4択",q:"Intel LGA1700ソケットに対応するCPU世代は？",opts:["第10・11世代","第12・13・14世代","第15世代以降","第8・9世代"],ans:1,exp:"LGA1700はAlder Lake(第12世代)・Raptor Lake(第13/14世代)に対応するIntelのソケットです。"},

  {t:"拡張スロット",type:"4択",q:"キャプチャーカードはどのスロットに取り付けるか？",opts:["DIMMスロット","M.2スロット","PCIeスロット","SATAポート"],ans:2,exp:"キャプチャーカードは通常PCIe x4またはx1スロットに取り付けます。"},
  {t:"拡張スロット",type:"○×",q:"PCIeスロットの電力供給はマザーボードのみで行われる。",ans:false,exp:"PCIeスロット自体は75Wまで供給できますが、高性能GPUは電源ユニットからの補助電源コネクタが必要です。"},
  {t:"拡張スロット",type:"4択",q:"ネットワーク拡張カード(NIC)をPCIeスロットに追加する主な理由は？",opts:["CPU性能向上","2.5G/10G Ethernetなど高速ネットワーク対応","ストレージ増設","グラフィック性能向上"],ans:1,exp:"マザーボードのオンボードNICが1GbEのみの場合、PCIe NICを追加して2.5G/10G Ethernetを利用できます。"},
  {t:"拡張スロット",type:"○×",q:"Wi-Fiカードは必ずPCIeスロットに取り付ける必要がある。",ans:false,exp:"Wi-FiカードはM.2スロット対応またはPCIeスロット対応のどちらの製品もあります。"},
  // ===== チップセット =====
  {t:"チップセット",type:"4択",q:"チップセットの主な役割は？",opts:["映像処理","CPUと周辺コンポーネントの通信管理","メモリエラー訂正","電圧変換"],ans:1,exp:"チップセットはCPUとUSBやSATAなど直接つながらない周辺機器の橋渡しをします。"},
  {t:"チップセット",type:"○×",q:"IntelのZシリーズチップセットはCPUオーバークロックに対応する。",ans:true,exp:"Intel Z790などZシリーズはアンロックCPU(末尾K)のOCをサポートします。"},
  {t:"チップセット",type:"4択",q:"AMD X670とB650の主な違いは？",opts:["X670の方が安価","X670の方が拡張性・OC機能が高い","B650の方が高性能","違いはない"],ans:1,exp:"X670はB650より上位でPCIe 5.0対応レーンや電力フェーズなどの仕様が充実しています。"},
  {t:"チップセット",type:"○×",q:"同じ世代のCPUでもチップセットのグレードによってOC対応が変わる。",ans:true,exp:"例えばIntelのH610はOC非対応ですが、Z790は同じCPUでもオーバークロックが可能です。"},
  {t:"チップセット",type:"4択",q:"IntelのHシリーズとZシリーズの主な違いは？",opts:["HシリーズはAMD用","HシリーズはOC非対応でコスト重視","Hシリーズの方が高性能","違いはない"],ans:1,exp:"Intel HシリーズはOC非対応のコスト重視モデルで、Zシリーズより機能が制限されます。"},
  {t:"チップセット",type:"○×",q:"チップセットはCPUとDMI(Direct Media Interface)で接続される。",ans:true,exp:"IntelではCPUとチップセットはDMIバスで接続されます。帯域幅はチップセット世代によって異なります。"},
  {t:"チップセット",type:"4択",q:"AMD B450とX570の違いは？",opts:["B450の方が高性能","X570はPCIe 4.0対応でB450はPCIe 3.0まで","B450のみOC対応","違いはない"],ans:1,exp:"X570はPCIe 4.0に完全対応しB450はPCIe 3.0止まりです。またX570は上位のVRM・拡張性を持ちます。"},
  {t:"チップセット",type:"○×",q:"チップセットのヒートシンクが熱くなるのは正常である。",ans:true,exp:"チップセットは動作中に発熱します。ヒートシンクで冷却するのは正常で、触れると熱く感じることもあります。"},
  {t:"チップセット",type:"4択",q:"Intel B760チップセットの特徴は？",opts:["OC非対応・コストパフォーマンス重視","最高性能・フル機能","エントリー向け最廉価","サーバー専用"],ans:0,exp:"Intel BシリーズはOC非対応ですがUSBポートやM.2スロットなど一般用途に必要な機能は揃ったコスパモデルです。"},
  {t:"チップセット",type:"○×",q:"チップセットの世代が変わるとCPUソケットも必ず変わる。",ans:false,exp:"IntelのZ490→Z590のように同じLGA1200ソケットで異なるチップセット世代が存在します。"},
  {t:"チップセット",type:"4択",q:"チップセットが提供するUSBポート数とCPUが直接提供するUSBポート数の関係は？",opts:["常に同じ","チップセットの方が多いことが一般的","CPUの方が多い","どちらも0"],ans:1,exp:"CPUは少数のUSBを直接サポートし、大部分のバックパネルUSBはチップセット経由で提供されます。"},
  {t:"チップセット",type:"○×",q:"AMD X570チップセットは独自のファンを搭載した製品がある。",ans:true,exp:"X570は発熱が多いためチップセット自体に小型ファンを搭載したマザーボードが多く存在します。"},
  {t:"チップセット",type:"4択",q:"Intel 600シリーズチップセット(Z690等)が対応するメモリは？",opts:["DDR4のみ","DDR5のみ","DDR4とDDR5の両方(マザーボードによる)","DDR3"],ans:2,exp:"Z690世代のマザーボードはDDR4対応モデルとDDR5対応モデルの両方が発売されました。"},
  {t:"チップセット",type:"○×",q:"チップセットはストレージコントローラーとしてSATAポートを管理する。",ans:true,exp:"SATAポートの多くはチップセット経由で管理されます。一部のM.2スロットはCPU直結の場合もあります。"},
  {t:"チップセット",type:"4択",q:"AMD X670EとX670の違いは？",opts:["価格のみ異なる","X670EはPCIe 5.0をCPUとチップセット両方でフルサポート","X670の方が高性能","メモリ規格が異なる"],ans:1,exp:"X670E(Extreme)はCPU側もチップセット側もPCIe 5.0をフルサポートするX670の上位モデルです。"},
  {t:"チップセット",type:"○×",q:"マザーボードに搭載されるSATAポート数はチップセットのみで決まる。",ans:false,exp:"SATAポート数はチップセットのレーン数が基本ですが、追加のSATAコントローラーチップを搭載したマザーボードもあります。"},
  {t:"チップセット",type:"4択",q:"Intel H610とZ790の価格差の主な理由は？",opts:["製造コスト","機能・OC対応・拡張性の差","ブランド名","見た目"],ans:1,exp:"H610はOC非対応・少ないM.2/USBポートなど機能制限がある分安価で、Z790は全機能フル搭載です。"},
  {t:"チップセット",type:"○×",q:"チップセットはCPUの種類に関係なく全てのマザーボードで共通して使える。",ans:false,exp:"チップセットはCPUメーカー・世代・ソケットごとに異なり、IntelとAMDで完全に別の規格です。"},
  {t:"チップセット",type:"4択",q:"将来世代のCPUを現行チップセットで使えるかを決める主な要因は？",opts:["CPUの色","ソケット互換性とBIOSアップデート対応","ケースサイズ","電源容量"],ans:1,exp:"ソケットが合致し、メーカーがBIOSアップデートで対応すれば新世代CPUを旧チップセットで使える場合があります。"},
  {t:"チップセット",type:"○×",q:"AMD AM4プラットフォームはB350からX570まで長期間同じソケットを維持した。",ans:true,exp:"AMD AM4はRyzen 1000〜5000番台まで同ソケットを維持し、CPUのみアップグレードできる点が評価されました。"},
  // ===== 電源・フォームファクター =====

  {t:"電源・フォームファクター",type:"○×",q:"80PLUS Gold認証の電源は50%負荷時に90%以上の変換効率がある。",ans:true,exp:"80PLUS Goldは20%/50%/100%負荷でそれぞれ87%/90%/87%以上の効率が必要です。"},
  {t:"電源・フォームファクター",type:"4択",q:"SFX電源はどのようなPCケース向けか？",opts:["大型タワーケース","スモールフォームファクター(SFF)ケース","サーバーラック","ノートPC"],ans:1,exp:"SFX電源はATXより小型でMini-ITXなどのコンパクトなSFFケース向けです。"},
  {t:"電源・フォームファクター",type:"4択",q:"モジュラー電源の利点は？",opts:["変換効率が高い","不要なケーブルを取り外せる","より静かに動作する","電圧が安定する"],ans:1,exp:"フルモジュラー電源は使わないケーブルを外せるためケース内のエアフローが改善します。"},
  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットの容量(W)が大きいほど消費電力が増える。",ans:false,exp:"電源容量は最大供給可能電力です。実際の消費電力はシステムの使用状況で決まります。"},

  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットの+12Vレールはグラフィックカードに電力を供給する主要なレールである。",ans:true,exp:"+12VレールはGPUや高電力コンポーネントへの主要な電源供給レールです。"},

  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットの変換効率が高いほど発熱が少なくなる。",ans:true,exp:"変換効率が高いほどロスが少なく、廃熱が減りファンノイズの低減にも貢献します。"},

  {t:"電源・フォームファクター",type:"○×",q:"SFX-L電源はSFXより大きくATXより小さいサイズである。",ans:true,exp:"SFX-Lは奥行きがSFXより長く、より大型のファンを搭載し静音性が向上した規格です。"},
  {t:"電源・フォームファクター",type:"4択",q:"電源ユニットのPFC(Power Factor Correction)の役割は？",opts:["電圧を安定させる","力率を改善し電力効率を高める","ファン速度を制御する","過電圧を防ぐ"],ans:1,exp:"PFCは入力電流波形を正弦波に近づけ力率を改善することで電力効率を高めます。"},
  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットのOCP(Over Current Protection)は過電流から保護する機能である。",ans:true,exp:"OCP・OVP(過電圧)・SCP(短絡)などの保護回路は電源ユニットとPCパーツを異常時の損傷から守ります。"},
  {t:"電源・フォームファクター",type:"4択",q:"フルモジュラー電源とセミモジュラー電源の違いは？",opts:["効率が異なる","セミモジュラーは一部のケーブルが固定","フルモジュラーの方が安価","認証レベルが異なる"],ans:1,exp:"セミモジュラーはATX24ピンなど主要ケーブルが固定で、オプションケーブルのみ着脱できます。"},
  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットの寿命は一般的に5〜10年とされる。",ans:true,exp:"電源ユニットの寿命はコンデンサの劣化などで一般的に5〜10年です。コンデンサの品質で大きく変わります。"},
  {t:"電源・フォームファクター",type:"4択",q:"電源のファンが低負荷時に停止している場合は？",opts:["必ず故障している","セミファンレスモードの可能性がある","電源容量が不足している","過熱している"],ans:1,exp:"ハイエンド電源ではセミファンレスモード(低負荷時にファンが止まる機能)を搭載した製品があります。"},
  {t:"電源・フォームファクター",type:"○×",q:"電源ユニットのW数が大きいほど電気代が高くなる。",ans:false,exp:"電気代は実際の消費電力で決まります。大容量電源でも低負荷使用なら消費電力は少なく電気代も変わりません。"},
  {t:"電源・フォームファクター",type:"4択",q:"SATA電源コネクタは何ピンか？",opts:["4ピン","7ピン","15ピン","24ピン"],ans:2,exp:"SATA電源コネクタは15ピンで、3.3V/5V/12Vの3つの電圧をSSD・HDD・光学ドライブに供給します。"},
  {t:"電源・フォームファクター",type:"○×",q:"Molex(4ピン大型)コネクタは現在でも広く使われている。",ans:false,exp:"Molexコネクタは古いHDDや一部ファン向けで、現在は使用頻度が大きく低下しています。"},
  {t:"電源・フォームファクター",type:"4択",q:"電源ユニットのSingle Rail設計とMulti Rail設計の違いは？",opts:["電圧の種類が異なる","+12Vの供給経路の数が異なる","冷却方式が異なる","認証規格が異なる"],ans:1,exp:"Single Railは+12Vを一本化し最大電流を自由に分配。Multi Railは安全のため複数の+12Vラインに分割します。"},
  // ===== BIOS・UEFI =====

  {t:"BIOS・UEFI",type:"○×",q:"POST(Power On Self Test)はBIOSが起動時にハードウェアを確認するプロセスである。",ans:true,exp:"POSTはBIOS/UEFIがCPU・メモリ・ストレージなどを起動時にチェックする自己診断プロセスです。"},
  {t:"BIOS・UEFI",type:"4択",q:"BIOSのフラッシュとは？",opts:["BIOSを消去する","BIOSファームウェアを更新する","BIOSをリセットする","BIOSを複製する"],ans:1,exp:"BIOSフラッシュはBIOSチップのファームウェアを新バージョンに更新することです。"},
  {t:"BIOS・UEFI",type:"○×",q:"セキュアブートはマルウェアの起動前実行を防ぐ機能である。",ans:true,exp:"セキュアブートはデジタル署名で検証されたOSのみ起動を許可しルートキット対策になります。"},
  {t:"BIOS・UEFI",type:"4択",q:"CMOSクリアをするとどうなるか？",opts:["OSが削除される","BIOS設定がデフォルトに戻る","CPUが初期化される","メモリが消去される"],ans:1,exp:"CMOSクリアはBIOS設定をリセットしますが、ストレージのデータは消えません。"},
  {t:"BIOS・UEFI",type:"○×",q:"UEFIはMBRパーティション形式のみサポートする。",ans:false,exp:"UEFIは主にGPT(GUIDパーティションテーブル)をサポートし、2TB超ドライブや128パーティションに対応します。"},
  {t:"BIOS・UEFI",type:"4択",q:"BIOS/UEFIでXMPを有効にする目的は？",opts:["CPUをOCする","メモリを定格以上の速度で動作させる","ストレージを高速化する","グラフィックを強化する"],ans:1,exp:"XMPをBIOSで有効にするとメモリがプロファイル通りの高クロック・低レイテンシで動作します。"},
  {t:"BIOS・UEFI",type:"○×",q:"BIOS更新(フラッシュ)に失敗するとマザーボードが起動しなくなる場合がある。",ans:true,exp:"BIOS書き込み失敗はデッドボード状態になるリスクがあります。一部のマザーボードはデュアルBIOSで復旧できます。"},
  {t:"BIOS・UEFI",type:"4択",q:"UEFIのCSM(Compatibility Support Module)の役割は？",opts:["UEFIをアップデートする","レガシーBIOS互換モードを提供する","セキュアブートを強化する","CPUをオーバークロックする"],ans:1,exp:"CSMはレガシーBIOSが必要な古いOSやデバイスをUEFI環境で動作させるための互換レイヤーです。"},
  {t:"BIOS・UEFI",type:"○×",q:"BIOS/UEFIの設定は電源を切っても保持される。",ans:true,exp:"BIOS設定はCMOSメモリに保存され、CMOSバッテリーにより電源オフ時も維持されます。"},
  {t:"BIOS・UEFI",type:"4択",q:"BIOS/UEFIで設定できる起動デバイスの優先順位(Boot Order)とは？",opts:["CPUコアの起動順序","OSを読み込むデバイスの試行順序","メモリスロットの有効化順序","PCIeスロットの起動順序"],ans:1,exp:"Boot Orderは起動時にOSを探すデバイス(SSD・USB・DVDなど)の優先順位を設定するものです。"},
  {t:"BIOS・UEFI",type:"○×",q:"最新のUEFIはネットワーク経由でファームウェアを更新できる製品がある。",ans:true,exp:"一部のマザーボードはUSBメモリ不要でインターネット経由でBIOSを更新できる機能を搭載しています。"},
  {t:"BIOS・UEFI",type:"4択",q:"CPUオーバークロック時にBIOS/UEFIで調整する主な項目は？",opts:["ディスプレイ解像度","CPU倍率・コア電圧・ベースクロック","サウンド設定","ネットワーク設定"],ans:1,exp:"OCではCPU倍率(Ratio)・コア電圧(Vcore)・ベースクロック(BCLK)をBIOS上で調整します。"},
  {t:"BIOS・UEFI",type:"○×",q:"TPM(Trusted Platform Module)はBIOS/UEFI経由で有効化できる。",ans:true,exp:"TPM 2.0はBIOS設定でfTPM(ファームウェアTPM)として有効化でき、Windows 11の要件の一つです。"},
  {t:"BIOS・UEFI",type:"4択",q:"BIOSのEZ ModeとAdvanced Modeの違いは？",opts:["どちらも同じ機能","EZ Modeは初心者向けシンプルUI、Advancedは全設定にアクセス可能","EZ Modeの方が多機能","Advancedはメモリ設定のみ"],ans:1,exp:"EZ Modeは主要設定をわかりやすく表示し、Advanced Modeでは詳細なOC・電圧・タイミング設定が可能です。"},
  {t:"BIOS・UEFI",type:"○×",q:"BIOS/UEFIのFan Curve設定でファン回転数を温度に応じて制御できる。",ans:true,exp:"Fan Curve設定ではCPU/ケースファンの回転数を温度に応じたカーブで制御し、静音性と冷却性のバランスを取れます。"},
  {t:"BIOS・UEFI",type:"○×",q:"UEFI GUIはマウス操作に対応している製品が多い。",ans:true,exp:"モダンなUEFI BIOSはマウス操作が可能なグラフィカルなUIを採用しており、直感的に設定できます。"},
  {t:"BIOS・UEFI",type:"4択",q:"デュアルBIOS機能の利点は？",opts:["BIOS更新速度が2倍になる","BIOS書き込み失敗時にバックアップBIOSで復旧できる","2つのOSを同時に起動できる","CPUを2つ搭載できる"],ans:1,exp:"デュアルBIOSはメインBIOSの更新失敗や破損時に、バックアップBIOSから自動的に復旧できる安全機能です。"},
  {t:"BIOS・UEFI",type:"○×",q:"BIOS/UEFIのVirtualization Technology設定は仮想マシンの動作に影響する。",ans:true,exp:"VT-x(Intel)/AMD-Vを有効にするとVMwareやVirtualBoxなどの仮想マシンが高速化・安定して動作します。"},

// ===================== STATE =====================
let allQuestions = [...SEED_QUESTIONS];
let sessionQuestions = [], sessionIdx = 0, sessionAnswered = false, sessionLog = [];
let totalCorrect = 0, totalAnswered = 0;
let selectedTopics = new Set(TOPICS);
let generating = false;

// ===================== PASSWORD =====================
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('quiz_auth', '1');
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います。もう一度お試しください。';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function togglePw() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function logout() {
  sessionStorage.removeItem('quiz_auth');
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
}

// ===================== INIT =====================
function init() {
  renderTopicBar();
  updateStats();
  renderGenArea();
  document.getElementById('header-sub').textContent = `${allQuestions.length}問収録 — ランダム20問出題`;
}

// ===================== TOPICS =====================
function renderTopicBar() {
  document.getElementById('topic-bar').innerHTML = TOPICS.map(t => {
    const cnt = allQuestions.filter(q => q.t === t).length;
    const act = selectedTopics.has(t);
    return `<button class="topic-pill${act?' active':''}" onclick="toggleTopic('${t}')">${t} <span style="opacity:.6">${cnt}</span></button>`;
  }).join('');
}

function toggleTopic(t) {
  if (selectedTopics.has(t)) { if (selectedTopics.size > 1) selectedTopics.delete(t); }
  else selectedTopics.add(t);
  renderTopicBar();
}

// ===================== STATS =====================
function updateStats() {
  document.getElementById('s-total').textContent = allQuestions.length;
  document.getElementById('s-correct').textContent = totalCorrect;
  document.getElementById('s-rate').textContent = totalAnswered ? Math.round(totalCorrect/totalAnswered*100)+'%' : '-';
}

// ===================== GENERATE =====================
function renderGenArea() {
  const ga = document.getElementById('gen-area');
  if (allQuestions.length >= 200) {
    ga.innerHTML = `<div class="gen-status">200問達成！全テーマをカバーしています</div>`;
    return;
  }
  ga.innerHTML = `<div class="gen-status">現在 ${allQuestions.length}問収録 — AIでさらに追加できます（目標200問）</div>
    <button class="gen-btn" id="gen-btn" onclick="generateMore()">AIで問題を追加生成</button>`;
}

async function generateMore() {
  if (generating) return;
  generating = true;
  const btn = document.getElementById('gen-btn');
  if (btn) btn.disabled = true;
  const ga = document.getElementById('gen-area');
  ga.innerHTML = `<div class="gen-status">AIが問題を生成中です…</div><div class="gen-bar-wrap"><div class="gen-bar-fill" id="gen-fill"></div></div>`;
  let pct = 0;
  const timer = setInterval(() => { pct = Math.min(pct+3,88); const f=document.getElementById('gen-fill'); if(f) f.style.width=pct+'%'; }, 200);
  const existing = allQuestions.map(q=>q.q).slice(0,40).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`マザーボード・PCハードウェア学習クイズ用の問題を20問生成してください。
テーマ(t): ${TOPICS.join('、')}
既存問題(重複不可):\n${existing}
JSON配列のみ返してください(説明文・コードブロック不要):
[{"t":"テーマ名","type":"4択 または ○×","q":"問題文","opts":["A","B","C","D"],"ans":正解インデックス0-3,"exp":"解説"}]
○×の場合はoptsを["○","×"]、ansをtrue/falseにしてください。全て日本語、正確な知識で。`}]
      })
    });
    clearInterval(timer);
    const f=document.getElementById('gen-fill'); if(f) f.style.width='100%';
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('')||'';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    parsed.forEach(q => {
      if (q.type==='○×') q.ans = (q.ans===0||q.ans===true||q.ans==='○');
      allQuestions.push(q);
    });
    renderTopicBar(); updateStats();
    document.getElementById('header-sub').textContent = `${allQuestions.length}問収録 — ランダム20問出題`;
    renderGenArea();
    const added = document.createElement('div');
    added.className = 'gen-status'; added.style.marginTop='6px';
    added.textContent = `+${parsed.length}問追加されました`;
    document.getElementById('gen-area').appendChild(added);
  } catch(e) {
    clearInterval(timer);
    document.getElementById('gen-area').innerHTML = `<div class="gen-status" style="color:var(--red-dark)">生成に失敗しました。</div>
      <button class="gen-btn" onclick="generateMore()">再試行</button>`;
  }
  generating = false;
}

// ===================== QUIZ =====================
function shuffle(a) { return [...a].sort(()=>Math.random()-.5); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function startQuiz() {
  const pool = shuffle(allQuestions.filter(q=>selectedTopics.has(q.t)));
  sessionQuestions = pool.slice(0, Math.min(20, pool.length));
  sessionIdx = 0; sessionLog = [];
  showScreen('screen-quiz');
  renderQ();
}

function renderQ() {
  const q = sessionQuestions[sessionIdx];
  const pct = Math.round(sessionIdx/sessionQuestions.length*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('q-counter').textContent = `問題 ${sessionIdx+1} / ${sessionQuestions.length}`;
  document.getElementById('q-topic-label').textContent = q.t;
  sessionAnswered = false;
  let html = `<div class="q-card"><span class="q-badge">${q.type} &nbsp; ${q.t}</span><div class="q-text">${q.q}</div>`;
  if (q.type==='4択') {
    html += `<div class="opts">${q.opts.map((o,i)=>`<button class="opt" id="opt-${i}" onclick="ans4(${i})">${o}</button>`).join('')}</div>`;
  } else {
    html += `<div class="tf-row"><button class="tf-btn" id="tf-t" onclick="ansTF(true)">○</button><button class="tf-btn" id="tf-f" onclick="ansTF(false)">×</button></div>`;
  }
  html += `<div id="fb"></div></div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function ans4(i) {
  if (sessionAnswered) return; sessionAnswered = true;
  const q = sessionQuestions[sessionIdx]; const ok = i===q.ans;
  q.opts.forEach((_,idx)=>{ const b=document.getElementById('opt-'+idx); b.disabled=true; if(idx===q.ans) b.classList.add('correct'); else if(idx===i) b.classList.add('wrong'); });
  record(ok,q);
}

function ansTF(val) {
  if (sessionAnswered) return; sessionAnswered = true;
  const q = sessionQuestions[sessionIdx]; const ok = val===q.ans;
  ['tf-t','tf-f'].forEach(id=>document.getElementById(id).disabled=true);
  document.getElementById(q.ans?'tf-t':'tf-f').classList.add('correct');
  if (!ok) document.getElementById(val?'tf-t':'tf-f').classList.add('wrong');
  record(ok,q);
}

function record(ok,q) {
  totalAnswered++; if(ok) totalCorrect++;
  sessionLog.push({q:q.q,ok,exp:q.exp,ans:q.type==='○×'?(q.ans?'○':'×'):q.opts[q.ans]});
  updateStats();
  const isLast = sessionIdx>=sessionQuestions.length-1;
  document.getElementById('fb').innerHTML = `<div class="feedback ${ok?'ok':'ng'}"><div class="fb-label">${ok?'正解！':'不正解'}</div>${q.exp}</div>
    <button class="next-btn" onclick="${isLast?'showResult()':'nextQ()'}">${isLast?'結果を見る':'次の問題へ'}</button>`;
}

function nextQ() { sessionIdx++; renderQ(); }

function showResult() {
  const score = sessionLog.filter(l=>l.ok).length;
  showScreen('screen-result');
  document.getElementById('r-score').textContent = score;
  const pct = Math.round(score/sessionQuestions.length*100);
  document.getElementById('r-msg').textContent = pct>=90?'素晴らしい！完璧に近い理解です':pct>=70?'よくできました！着実に理解が深まっています':pct>=50?'まだ伸びしろあり！間違えた問題を復習しよう':'もう少し！基礎から見直してみましょう';
  let html = '<div class="log-title">解答ログ</div>';
  sessionLog.forEach((l,i)=>{ html+=`<div class="log-item"><span class="log-icon" style="color:${l.ok?'#639922':'#E24B4A'}">${l.ok?'○':'×'}</span><div><div class="log-q">Q${i+1}. ${l.q}</div><div class="log-ans">正解: ${l.ans} — ${l.exp}</div></div></div>`; });
  document.getElementById('result-log').innerHTML = html;
}

// Auto-login if already authenticated in session
if (sessionStorage.getItem('quiz_auth') === '1') {
  document.getElementById('pw-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });
</script>
</body>
</html>
